<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Collaborative Code Editor</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

/* Background */

body{
height:100vh;
background:linear-gradient(120deg,#4facfe,#00f2fe);
display:flex;
justify-content:center;
align-items:center;
}

/* Main App Container */

.app{
width:90%;
height:90vh;
background:white;
border-radius:15px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
display:flex;
flex-direction:column;
overflow:hidden;
}

/* Header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:#1f2937;
color:white;
}

.logo{
font-size:20px;
font-weight:bold;
}

/* Users */

.users{
display:flex;
gap:10px;
}

.user{
width:35px;
height:35px;
border-radius:50%;
background:#4facfe;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:14px;
}

/* Toolbar */

.toolbar{
display:flex;
gap:15px;
padding:10px 20px;
background:#f4f6fb;
border-bottom:1px solid #ddd;
}

.tool{
padding:6px 12px;
border-radius:5px;
background:white;
border:1px solid #ddd;
cursor:pointer;
transition:0.3s;
}

.tool:hover{
background:#4facfe;
color:white;
}

/* Workspace */

.workspace{
flex:1;
display:flex;
}

/* Sidebar */

.sidebar{
width:200px;
background:#f8f9fc;
border-right:1px solid #ddd;
padding:15px;
}

.sidebar h3{
margin-bottom:10px;
}

.file{
padding:8px;
border-radius:5px;
margin-bottom:5px;
cursor:pointer;
}

.file:hover{
background:#e0ecff;
}

/* Editor */

.editor{
flex:1;
padding:20px;
background:#fafafa;
}

textarea{
width:100%;
height:100%;
border:none;
resize:none;
font-family:monospace;
font-size:15px;
outline:none;
background:white;
padding:15px;
border-radius:10px;
box-shadow:inset 0 0 10px rgba(0,0,0,0.1);
}

/* Footer */

.footer{
padding:8px 15px;
background:#1f2937;
color:white;
font-size:12px;
display:flex;
justify-content:space-between;
}

</style>
</head>

<body>

<div class="app">

<!-- HEADER -->

<div class="header">

<div class="logo">CollabCode</div>

<div class="users">
<div class="user">A</div>
<div class="user">B</div>
<div class="user">C</div>
</div>

</div>

<!-- TOOLBAR -->

<div class="toolbar">

<div class="tool">Bold</div>
<div class="tool">Italic</div>
<div class="tool">Code</div>
<div class="tool">Comment</div>
<div class="tool">Share</div>

</div>

<!-- WORKSPACE -->

<div class="workspace">

<div class="sidebar">

<h3>Files</h3>

<div class="file">notes.md</div>
<div class="file">project.txt</div>
<div class="file">ideas.md</div>

</div>

<div class="editor">

<textarea placeholder="Start writing your collaborative notes or code here..."></textarea>

</div>

</div>

<!-- FOOTER -->

<div class="footer">

<span>Status: Connected</span>
<span>3 collaborators online</span>

</div>

</div>

</body>
</html>
